[package]
name = "scena"
version = "1.0.0"
edition = "2024"
rust-version = "1.90"
license = "MIT OR Apache-2.0"
description = "A Rust-native scene-graph renderer intended as an easy, production-safe Three.js replacement."
readme = "README.md"
documentation = "https://docs.rs/scena"
keywords = ["renderer", "scene-graph", "gltf", "webgpu", "wasm"]
categories = ["graphics", "rendering", "wasm"]
include = [
    "src/**",
    "tests/**",
    "examples/**",
    "docs/**",
    "README.md",
    "CHANGELOG.md",
    "LICENSE-*",
    "Cargo.toml",
    "Cargo.lock",
]

[workspace]
members = [".", "crates/xtask"]
resolver = "3"

[lib]
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[dependencies]
base64 = "0.22"
raw-window-handle = "0.6.2"
serde_json = "1"
slotmap = "1.0"
wgpu = { version = "29.0.3", features = ["webgl"] }

[features]
default = []
controls = []
controls-winit = ["controls"]
controls-web = ["controls"]
obj = []

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
pollster = "0.4.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3.82"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3.82", features = [
    "CanvasRenderingContext2d",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "HtmlElement",
    "ImageData",
    "Response",
    "Window",
] }

[dev-dependencies]
pollster = "0.4.0"

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"
