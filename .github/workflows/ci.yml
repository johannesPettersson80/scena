name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

env:
  RUST_TOOLCHAIN: "1.93.1"
  WASM_PACK_VERSION: "0.14.0"
  NODE_VERSION: "20.20.0"
  NPM_VERSION: "10.8.2"
  PLAYWRIGHT_VERSION: "1.59.1"
  BINARYEN_VERSION: "129.0.0"
  BROTLI_CLI_VERSION: "2.1.1"

jobs:
  linux-native-vulkan:
    name: Linux native/headless
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Cargo gates
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          cargo test --features inspection --test m7_threejs_ergonomics m7_scene_inspection
          cargo test --features ktx2 --test m8_assets_materials_ecosystem m8_ktx2_basisu_feature_loads_compressed_texture_descriptor
          bash scripts/release_lane_command.sh linux-native-vulkan cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh headless-cpu cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh linux-native-vulkan cargo check --examples
          cargo check --example scene_inspection --features inspection
          cargo run -p xtask -- doctor --full
          cargo run -p xtask -- claim-audit
      - name: Docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features
      - name: Release lane artifact
        run: |
          cargo run -p xtask -- release-lane-artifact linux-native-vulkan
          cargo run -p xtask -- release-lane-artifact headless-cpu
      - name: Upload gate artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native-vulkan-gate-artifacts
          path: target/gate-artifacts/**
          if-no-files-found: error

  linux-browser-webgl2:
    name: Linux browser WebGL2
    runs-on: ubuntu-24.04
    # Headless Chromium WebGL2 + WebGPU lanes regress through wasm-bindgen-test in CI
    # without a real graphics adapter. The browser-renderer-parity contract is exercised
    # locally on the maintainer's checkout and recorded in the M6 probe artifact; the CI
    # job stays scheduled (so failures stay visible and fixable) but does not block the
    # other release lanes until the headless-driver gap closes — see ADR-0005.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
      - name: Install pinned browser driver
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Browser proof
        env:
          SCENA_BROWSER_BACKENDS: webgl2
        run: |
          wasm-pack test --headless --chrome --test m6_browser_renderer_parity
          bash scripts/release_lane_command.sh linux-webgl2-chromium wasm-pack build --dev --target web --out-dir target/m6-browser-pkg . --features browser-probe
          bash scripts/release_lane_command.sh linux-webgl2-chromium npm run browser:m6
          cargo run -p xtask -- release-lane-artifact linux-webgl2-chromium
      - name: Upload browser artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-browser-webgl2-gate-artifacts
          path: target/gate-artifacts/**
          if-no-files-found: error

  linux-browser-webgpu:
    name: Linux browser WebGPU
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
      - name: Install pinned browser driver
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Browser WebGPU proof through Rust/WASM
        env:
          SCENA_BROWSER_BACKENDS: webgpu
          SCENA_BROWSER_ALLOW_UNAVAILABLE: "1"
        run: |
          bash scripts/release_lane_command.sh linux-webgpu-chromium wasm-pack build --dev --target web --out-dir target/m6-browser-pkg . --features browser-probe
          bash scripts/release_lane_command.sh linux-webgpu-chromium npm run browser:m6
          cargo run -p xtask -- release-lane-artifact linux-webgpu-chromium
      - name: Upload browser artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-browser-webgpu-gate-artifacts
          path: target/gate-artifacts/**
          if-no-files-found: error

  wasm32:
    name: wasm32 compile and package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
      - name: Install pinned size-gate tools
        run: npm ci
      - name: WASM compile
        run: cargo check --target wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: WASM release build
        run: bash scripts/release_lane_command.sh wasm32-unknown-unknown wasm-pack build --release --target web --out-dir target/m9-browser-pkg . --features browser-probe
      - name: WASM size gate
        run: bash scripts/release_lane_command.sh wasm32-unknown-unknown npm run wasm:size
      - name: Release lane artifact
        run: cargo run -p xtask -- release-lane-artifact wasm32-unknown-unknown
      - name: Upload WASM package
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wasm32-package
          path: |
            target/m9-browser-pkg/**
            target/gate-artifacts/m9-wasm-size.json
          if-no-files-found: error

  macos-metal:
    name: macOS Metal
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Platform parity gates
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets
          bash scripts/release_lane_command.sh macos-metal cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh macos-metal cargo check --examples
          cargo run -p xtask -- doctor --full
      - name: Docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features
      - name: Release lane artifact
        run: |
          cargo run -p xtask -- release-lane-artifact macos-metal
      - name: Upload gate artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-metal-gate-artifacts
          path: target/gate-artifacts/**
          if-no-files-found: error

  windows-dx12:
    name: Windows DX12
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Platform parity gates
        shell: bash
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets
          bash scripts/release_lane_command.sh windows-dx12 cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh windows-dx12 cargo check --examples
          cargo run -p xtask -- doctor --full
      - name: Docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features
      - name: Release lane artifact
        run: |
          cargo run -p xtask -- release-lane-artifact windows-dx12
      - name: Upload gate artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-dx12-gate-artifacts
          path: target/gate-artifacts/**
          if-no-files-found: error

  headless-4k-performance:
    name: Headless 4K performance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - name: Dedicated 4K benchmark
        run: cargo test --release --test m9_platform_release m9_dedicated_headless_4k_benchmark_writes_release_blocker_artifact -- --ignored
      - name: Upload 4K benchmark artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: headless-4k-performance-gate-artifacts
          path: target/gate-artifacts/**
          if-no-files-found: error

  premerge-release-readiness:
    name: Pre-merge release readiness
    runs-on: ubuntu-24.04
    needs:
      - linux-native-vulkan
      - linux-browser-webgl2
      - linux-browser-webgpu
      - wasm32
      - macos-metal
      - windows-dx12
      - headless-4k-performance
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - name: Download release lane artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/release-artifacts
      - name: Release readiness drift check
        env:
          SCENA_RELEASE_ARTIFACT_ROOT: target/release-artifacts
        run: cargo run -p xtask -- release-readiness
