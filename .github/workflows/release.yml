name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  RUST_TOOLCHAIN: "1.93.1"
  NODE_VERSION: "20.20.0"
  PLAYWRIGHT_VERSION: "1.59.1"
  BINARYEN_VERSION: "129.0.0"
  BROTLI_CLI_VERSION: "2.1.1"

jobs:
  linux-native-vulkan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Native release lane
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          bash scripts/release_lane_command.sh linux-native-vulkan cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh headless-cpu cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh linux-native-vulkan cargo check --examples
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features
          cargo run -p xtask -- doctor --full
          cargo run -p xtask -- release-lane-artifact linux-native-vulkan
          cargo run -p xtask -- release-lane-artifact headless-cpu
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-linux-native-vulkan
          path: target/gate-artifacts/**
          if-no-files-found: error

  linux-browser-webgl2:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
      - name: Browser WebGL2 release lane
        env:
          SCENA_BROWSER_BACKENDS: webgl2
        run: |
          npm ci
          npx playwright install chromium --with-deps
          cargo install wasm-pack --version 0.14.0 --locked
          wasm-pack test --headless --chrome --test m6_browser_renderer_parity
          bash scripts/release_lane_command.sh linux-webgl2-chromium wasm-pack build --dev --target web --out-dir target/m6-browser-pkg . --features browser-probe
          bash scripts/release_lane_command.sh linux-webgl2-chromium npm run browser:m6
          cargo run -p xtask -- release-lane-artifact linux-webgl2-chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-linux-webgl2-chromium
          path: target/gate-artifacts/**
          if-no-files-found: error

  linux-browser-webgpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
      - name: Browser WebGPU release lane
        env:
          SCENA_BROWSER_BACKENDS: webgpu
        run: |
          npm ci
          npx playwright install chromium --with-deps
          cargo install wasm-pack --version 0.14.0 --locked
          bash scripts/release_lane_command.sh linux-webgpu-chromium wasm-pack build --dev --target web --out-dir target/m6-browser-pkg . --features browser-probe
          bash scripts/release_lane_command.sh linux-webgpu-chromium npm run browser:m6
          cargo run -p xtask -- release-lane-artifact linux-webgpu-chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-linux-webgpu-chromium
          path: target/gate-artifacts/**
          if-no-files-found: error

  wasm32-unknown-unknown:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
      - name: WASM release lane
        run: |
          npm ci
          cargo check --target wasm32-unknown-unknown
          cargo install wasm-pack --version 0.14.0 --locked
          bash scripts/release_lane_command.sh wasm32-unknown-unknown wasm-pack build --release --target web --out-dir target/m9-browser-pkg . --features browser-probe
          bash scripts/release_lane_command.sh wasm32-unknown-unknown npm run wasm:size
          cargo run -p xtask -- release-lane-artifact wasm32-unknown-unknown
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-wasm32-unknown-unknown
          path: |
            target/m9-browser-pkg/**
            target/gate-artifacts/**
          if-no-files-found: error

  macos-metal:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: macOS release lane
        run: |
          cargo test --all-targets
          bash scripts/release_lane_command.sh macos-metal cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh macos-metal cargo check --examples
          cargo run -p xtask -- release-lane-artifact macos-metal
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-macos-metal
          path: target/gate-artifacts/**
          if-no-files-found: error

  windows-dx12:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Windows release lane
        shell: bash
        run: |
          cargo test --all-targets
          bash scripts/release_lane_command.sh windows-dx12 cargo test --test m9_platform_release
          bash scripts/release_lane_command.sh windows-dx12 cargo check --examples
          cargo run -p xtask -- release-lane-artifact windows-dx12
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-windows-dx12
          path: target/gate-artifacts/**
          if-no-files-found: error

  headless-4k-performance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - name: Dedicated 4K benchmark
        run: cargo test --release --test m9_platform_release m9_dedicated_headless_4k_benchmark_writes_release_blocker_artifact -- --ignored
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-headless-4k-performance
          path: target/gate-artifacts/**
          if-no-files-found: error

  publish:
    needs:
      - linux-native-vulkan
      - linux-browser-webgl2
      - linux-browser-webgpu
      - wasm32-unknown-unknown
      - macos-metal
      - windows-dx12
      - headless-4k-performance
    runs-on: ubuntu-24.04
    environment: crates-io
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Download release lane artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/release-artifacts
      - name: Release readiness
        env:
          SCENA_RELEASE_ARTIFACT_ROOT: target/release-artifacts
        run: cargo run -p xtask -- release-readiness
      - name: Clean publish dry run
        run: cargo publish --dry-run
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --notes-file CHANGELOG.md
