# WaterBottle reference image metadata for tests/m8_real_asset_proof.rs.
#
# After Phase 5.5 there are TWO bundled references with distinct
# purposes — see [scena_gold] and [blender_cycles] below.

[scena_gold]
# Regression-prevention baseline. Bit-identical to scena's GPU output
# at the time Phase 1 landed; consumed by Phase 2's tight per-region
# asserts + ΔE diff (gated by SCENA_REFERENCE_DIFF=1). Any drift trips
# the test, so this catches every scena-internal regression: parser
# swap, shader edit, capability flip, mip-generation change.
relative_path = "reference_512.png"
sha256 = "4db449cdacf2340f8fa53937c28e5c4b5e2c7deaea73cbe0987dcd51eb93c751"
width = 512
height = 512
generated_at = "2026-05-12"
generated_by = "scena GPU pipeline (llvmpipe Mesa lavapipe Vulkan, Khronos PBR Neutral)"
purpose = "scena-gold regression baseline"
diff_tolerance = "tight (RGB Chebyshev ≤16, 95% pixel match after 4x supersampled GPU render downsampled to 512px)"

[blender_cycles]
# Third-party PBR reference. Produced by Blender's Cycles path tracer
# (128 spp, neutral studio lighting) and is the answer to "what does a
# known-good PBR renderer produce for this asset". scena and Blender
# do not pixel-match — different shaders, tonemap, sampling — but
# their MATERIAL CLASSIFICATION agrees. The
# `waterbottle_blender_and_scena_agree_on_material_colour_families`
# test pins that agreement: same olive/yellow body, same dark
# burgundy cap, etc.
relative_path = "reference_blender_cycles_512.png"
sha256 = "17db39248ce1966ae60c3b85d09491ebfb7f654777dc2d150a64db4e938a6883"
width = 512
height = 512
generated_at = "2026-05-12"
generated_by = "Blender 4.3.2 Cycles CPU 128 spp"
purpose = "third-party PBR validation"
diff_tolerance = "loose (colour-family agreement only)"
regenerate_with = "blender --background --python tests/assets/gltf/khronos/WaterBottle/render_blender_reference.py"

[material_classification_agreement]
# Both references agree on what the asset's materials are. Numbers
# below are average RGB sampled over a small region of each material
# in each render (Khronos thumbnail, scena GPU with neutral lighting,
# Blender Cycles). All three agree on the colour family.
khronos_thumb_cap        = "(85, 44, 44)"   # dark red
scena_neutral_cap        = "(76, 30, 12)"   # dark red
blender_cycles_cap       = "(80, 50, 43)"   # dark red

khronos_thumb_body       = "(107, 97, 57)"  # olive/yellow
scena_neutral_body       = "(156, 134, 49)" # olive/yellow
blender_cycles_body      = "(155, 138, 69)" # olive/yellow

khronos_thumb_label      = "(57, 52, 38)"   # very dark (label band)
scena_neutral_label      = "(92, 77, 29)"   # very dark
blender_cycles_label     = "(91, 81, 56)"   # very dark
