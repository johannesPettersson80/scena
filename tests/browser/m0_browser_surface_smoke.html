<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>scena M0 browser surface smoke</title>
  <style>
    html, body { margin: 0; background: #000; }
    canvas { display: block; width: 64px; height: 64px; }
  </style>
</head>
<body>
  <canvas id="surface" width="64" height="64"></canvas>
  <script>
    const WIDTH = 64;
    const HEIGHT = 64;

    function countNonBlack(bytes, stride = WIDTH * 4) {
      let nonBlack = 0;
      for (let y = 0; y < HEIGHT; y += 1) {
        const row = y * stride;
        for (let x = 0; x < WIDTH; x += 1) {
          const offset = row + x * 4;
          if (bytes[offset] !== 0 || bytes[offset + 1] !== 0 || bytes[offset + 2] !== 0) {
            nonBlack += 1;
          }
        }
      }
      return nonBlack;
    }

    async function runWebGpuSmoke(canvas) {
      if (!navigator.gpu) {
        return { backend: "webgpu", status: "unsupported", reason: "navigator.gpu unavailable" };
      }
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) {
        return { backend: "webgpu", status: "unsupported", reason: "adapter unavailable" };
      }
      const device = await adapter.requestDevice();
      const context = canvas.getContext("webgpu");
      if (!context) {
        return { backend: "webgpu", status: "unsupported", reason: "canvas webgpu context unavailable" };
      }

      const format = navigator.gpu.getPreferredCanvasFormat();
      context.configure({
        device,
        format,
        alphaMode: "opaque",
        usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.COPY_SRC,
      });
      const shader = device.createShaderModule({
        code: `
          struct VertexOut {
            @builtin(position) position: vec4<f32>,
            @location(0) color: vec4<f32>,
          };

          @vertex
          fn vs_main(@builtin(vertex_index) vertex_index: u32) -> VertexOut {
            let positions = array<vec2<f32>, 3>(
              vec2<f32>(-0.6, -0.5),
              vec2<f32>(0.6, -0.5),
              vec2<f32>(0.0, 0.6),
            );
            let colors = array<vec4<f32>, 3>(
              vec4<f32>(1.0, 0.2, 0.1, 1.0),
              vec4<f32>(0.1, 0.8, 0.2, 1.0),
              vec4<f32>(0.1, 0.3, 1.0, 1.0),
            );
            var out: VertexOut;
            out.position = vec4<f32>(positions[vertex_index], 0.0, 1.0);
            out.color = colors[vertex_index];
            return out;
          }

          @fragment
          fn fs_main(in: VertexOut) -> @location(0) vec4<f32> {
            return in.color;
          }
        `,
      });
      const pipeline = device.createRenderPipeline({
        layout: "auto",
        vertex: { module: shader, entryPoint: "vs_main" },
        fragment: { module: shader, entryPoint: "fs_main", targets: [{ format }] },
        primitive: { topology: "triangle-list" },
      });

      const texture = context.getCurrentTexture();
      const bytesPerRow = WIDTH * 4;
      const readback = device.createBuffer({
        size: bytesPerRow * HEIGHT,
        usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ,
      });
      const encoder = device.createCommandEncoder();
      const pass = encoder.beginRenderPass({
        colorAttachments: [{
          view: texture.createView(),
          clearValue: { r: 0, g: 0, b: 0, a: 1 },
          loadOp: "clear",
          storeOp: "store",
        }],
      });
      pass.setPipeline(pipeline);
      pass.draw(3);
      pass.end();
      encoder.copyTextureToBuffer(
        { texture },
        { buffer: readback, bytesPerRow },
        { width: WIDTH, height: HEIGHT, depthOrArrayLayers: 1 },
      );
      device.queue.submit([encoder.finish()]);
      await readback.mapAsync(GPUMapMode.READ);
      const bytes = new Uint8Array(readback.getMappedRange()).slice();
      readback.unmap();

      const nonBlackPixels = countNonBlack(bytes, bytesPerRow);
      return {
        backend: "webgpu",
        status: nonBlackPixels > 0 ? "passed" : "failed",
        nonBlackPixels,
      };
    }

    function compileShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader));
      }
      return shader;
    }

    function runWebGl2Smoke(canvas) {
      const gl = canvas.getContext("webgl2", { preserveDrawingBuffer: true });
      if (!gl) {
        return { backend: "webgl2", status: "unsupported", reason: "canvas webgl2 context unavailable" };
      }
      const vertex = compileShader(gl, gl.VERTEX_SHADER, `#version 300 es
        precision highp float;
        out vec4 v_color;
        const vec2 positions[3] = vec2[3](
          vec2(-0.6, -0.5),
          vec2(0.6, -0.5),
          vec2(0.0, 0.6)
        );
        const vec4 colors[3] = vec4[3](
          vec4(1.0, 0.2, 0.1, 1.0),
          vec4(0.1, 0.8, 0.2, 1.0),
          vec4(0.1, 0.3, 1.0, 1.0)
        );
        void main() {
          gl_Position = vec4(positions[gl_VertexID], 0.0, 1.0);
          v_color = colors[gl_VertexID];
        }
      `);
      const fragment = compileShader(gl, gl.FRAGMENT_SHADER, `#version 300 es
        precision highp float;
        in vec4 v_color;
        out vec4 out_color;
        void main() {
          out_color = v_color;
        }
      `);
      const program = gl.createProgram();
      gl.attachShader(program, vertex);
      gl.attachShader(program, fragment);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        throw new Error(gl.getProgramInfoLog(program));
      }

      gl.viewport(0, 0, WIDTH, HEIGHT);
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(program);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      const bytes = new Uint8Array(WIDTH * HEIGHT * 4);
      gl.readPixels(0, 0, WIDTH, HEIGHT, gl.RGBA, gl.UNSIGNED_BYTE, bytes);
      const nonBlackPixels = countNonBlack(bytes);
      return {
        backend: "webgl2",
        status: nonBlackPixels > 0 ? "passed" : "failed",
        nonBlackPixels,
      };
    }

    window.scenaM0BrowserSurfaceSmoke = async function scenaM0BrowserSurfaceSmoke(backend) {
      const canvas = document.getElementById("surface");
      if (backend === "webgpu") {
        return runWebGpuSmoke(canvas);
      }
      if (backend === "webgl2") {
        return runWebGl2Smoke(canvas);
      }
      throw new Error(`unknown backend ${backend}`);
    };
  </script>
</body>
</html>
